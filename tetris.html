<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tetris — Remote Play</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SHARED SCREEN BASE ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }

    /* ── BEGIN SCREEN (fallback) ── */
    #begin-screen { display: flex; gap: 32px; }
    #begin-screen.hidden { opacity:0; pointer-events:none; position:absolute; }
    .title {
      font-size: 4em; font-weight: bold; letter-spacing: 12px;
      background: linear-gradient(90deg,#00f0f0,#a000f0,#f00000,#f0f000);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .title-sub { font-size:1em; color:#64748b; letter-spacing:4px; margin-top:-16px; }
    .begin-buttons { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
    .begin-btn {
      padding:20px 36px; font-family:'Courier New',monospace; font-size:1.2em;
      font-weight:bold; border:3px solid #334155; border-radius:16px;
      background:#1e293b; color:#e2e8f0; cursor:pointer; transition:all .2s;
      min-width:220px; text-align:center;
    }
    .begin-btn:hover { border-color:#60a5fa; background:#1e3a5f; transform:translateY(-2px); }
    .begin-btn .icon { font-size:1.4em; display:block; margin-bottom:6px; }

    /* ── BACK BUTTON ── */
    #back-btn {
      position:fixed; top:12px; left:16px; background:none;
      border:1px solid #475569; color:#94a3b8; font-family:monospace;
      font-size:.85em; padding:6px 14px; border-radius:6px;
      cursor:pointer; z-index:300; display:none;
    }
    #back-btn:hover { background:#1e293b; color:#e2e8f0; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:#1e293b; border:1px solid #475569; color:#fbbf24;
      font-family:monospace; font-size:.9em; padding:10px 24px;
      border-radius:8px; z-index:300; opacity:0;
      transition:opacity .35s,transform .35s; pointer-events:none;
    }
    #toast.visible { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── HOST LOBBY ── */
    #host-lobby { gap:20px; }
    .lobby-title { font-size:2em; font-weight:bold; color:#60a5fa; }
    .lobby-code {
      font-size:3em; font-weight:bold; letter-spacing:8px; color:#60a5fa;
      background:#1e293b; padding:16px 36px; border-radius:12px;
      border:2px dashed #334155;
    }
    .lobby-hint { font-size:.85em; color:#475569; text-align:center; }
    #player-list {
      display:flex; flex-direction:column; gap:8px;
      width:100%; max-width:320px; min-height:60px;
    }
    .player-entry {
      display:flex; align-items:center; gap:10px;
      padding:10px 16px; background:#1e293b; border-radius:8px;
      border:1px solid #334155; font-size:.95em;
    }
    .player-dot { color:#4ade80; }
    .player-list-empty { color:#475569; font-size:.9em; text-align:center; padding:16px; }
    #start-game-btn {
      padding:16px 48px; font-family:monospace; font-size:1.2em; font-weight:bold;
      border:3px solid #334155; border-radius:12px; background:#1e293b;
      color:#e2e8f0; cursor:pointer; transition:all .2s;
    }
    #start-game-btn:disabled { opacity:.35; cursor:not-allowed; }
    #start-game-btn:not(:disabled):hover { border-color:#4ade80; background:#1e3a5f; }

    /* ── HOST STATUS BAR ── */
    #host-status-bar {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      background:#1e293b; border:1px solid #334155; border-radius:8px;
      padding:6px 18px; font-size:.85em; z-index:200;
      display:none; gap:12px; white-space:nowrap;
    }
    #host-status-bar .room-code { color:#60a5fa; font-weight:bold; letter-spacing:2px; }

    /* ── HOST GAME ── */
    #host-game {
      display:none; flex-direction:column; align-items:center;
      min-height:100vh; padding:52px 8px 16px;
    }
    #games-grid {
      display:flex; flex-wrap:wrap; gap:20px;
      justify-content:center; align-items:flex-start;
    }
    .game-card {
      background:#1e293b; border:2px solid #334155; border-radius:12px;
      padding:10px; display:flex; flex-direction:column;
      align-items:center; gap:6px;
    }
    .game-card.is-over { opacity:.55; }
    .game-player-name { font-weight:bold; font-size:.95em; color:#60a5fa; }
    .game-info-row { display:flex; gap:14px; }
    .mini-box { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .mini-box span { font-size:.65em; color:#64748b; text-transform:uppercase; }
    .mini-canvas { background:#111; border-radius:4px; border:1px solid #334155; }
    .game-canvas {
      background:#111; border-radius:8px; display:block;
      border:2px solid #334155;
    }
    #games-grid.p-1 .game-canvas { width:320px; height:640px; }
    #games-grid.p-2 .game-canvas { width:260px; height:520px; }
    #games-grid.p-3 .game-canvas { width:200px; height:400px; }
    #games-grid.p-4 .game-canvas { width:180px; height:360px; }
    .game-score-row { display:flex; gap:16px; font-size:.8em; color:#94a3b8; }

    /* ── HOST RESULTS ── */
    #host-results { gap:28px; }
    .results-title { font-size:2.5em; font-weight:bold; color:#fbbf24; }
    #results-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:360px; }
    .result-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 18px; background:#1e293b; border-radius:8px;
      border:1px solid #334155;
    }
    .result-rank { color:#fbbf24; font-weight:bold; min-width:30px; }
    .result-name { color:#e2e8f0; flex:1; margin:0 12px; }
    .result-score { color:#60a5fa; font-weight:bold; }
    .results-buttons { display:flex; gap:16px; }
    .results-btn {
      padding:14px 32px; font-family:monospace; font-size:1em; font-weight:bold;
      border:2px solid #334155; border-radius:10px; background:#1e293b;
      color:#e2e8f0; cursor:pointer; transition:all .15s;
    }
    .results-btn:hover { border-color:#60a5fa; background:#1e3a5f; }

    /* ── CONTROLLER JOIN ── */
    #controller-join label { font-size:1.1em; color:#94a3b8; }
    #name-input {
      font-family:'Courier New',monospace; font-size:1.4em; text-align:center;
      width:220px; padding:12px;
      border:2px solid #334155; border-radius:10px; background:#1e293b;
      color:#e2e8f0; outline:none;
    }
    #name-input:focus { border-color:#60a5fa; }
    #room-input {
      font-family:'Courier New',monospace; font-size:2em; text-align:center;
      letter-spacing:6px; text-transform:uppercase; width:220px; padding:12px;
      border:2px solid #334155; border-radius:10px; background:#1e293b;
      color:#60a5fa; outline:none;
    }
    #room-input:focus { border-color:#60a5fa; }
    #connect-btn {
      padding:14px 36px; font-family:monospace; font-size:1.1em; font-weight:bold;
      border:2px solid #334155; border-radius:10px; background:#1e293b;
      color:#e2e8f0; cursor:pointer; transition:all .15s;
    }
    #connect-btn:hover { border-color:#60a5fa; background:#1e3a5f; }
    #join-error { color:#f87171; font-size:.9em; min-height:1.2em; }

    /* ── CONTROLLER WAITING ── */
    #controller-waiting { gap:16px; text-align:center; }
    .ctrl-wait-code { font-size:2em; color:#60a5fa; font-weight:bold; letter-spacing:4px; }
    .ctrl-wait-msg { color:#94a3b8; font-size:1.1em; }
    .ctrl-wait-dot { display:inline-block; animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── CONTROLLER D-PAD ── */
    #controller-view { gap:16px; padding:16px; }
    #ctrl-status {
      font-size:.9em; padding:5px 16px; border-radius:6px; margin-bottom:4px;
      background:#16a34a; color:#fff;
    }
    .dpad {
      display:grid;
      grid-template-columns:80px 80px 80px;
      grid-template-rows:80px 80px 80px;
      gap:10px;
    }
    .btn-rotate   { grid-column:2; grid-row:1; }
    .btn-pause    { grid-column:3; grid-row:1; }
    .btn-left     { grid-column:1; grid-row:2; }
    .btn-right    { grid-column:3; grid-row:2; }
    .btn-softdrop { grid-column:2; grid-row:3; }
    .btn {
      min-width:64px; min-height:64px; width:80px; height:80px;
      border:2px solid #475569; border-radius:16px; background:#334155;
      color:#e2e8f0; font-family:monospace; font-size:.85em; font-weight:bold;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer; transition:background .08s,transform .08s,border-color .08s;
      user-select:none; -webkit-user-select:none;
      touch-action:none; -webkit-tap-highlight-color:transparent;
    }
    .btn .icon  { font-size:1.7em; line-height:1; }
    .btn .label { font-size:.68em; margin-top:2px; opacity:.7; }
    .btn:hover { background:#475569; }
    .btn.pressed { background:#60a5fa; border-color:#93c5fd; color:#1e293b; transform:scale(.92); }
    .bottom-actions { display:flex; gap:12px; width:100%; max-width:260px; }
    .btn-wide {
      flex:1; width:auto; height:68px; border-radius:14px;
    }

    /* ── CONTROLLER GAME OVER ── */
    #controller-gameover { gap:16px; text-align:center; }
    .ctrl-go-title { font-size:2em; font-weight:bold; color:#fbbf24; }
    .ctrl-go-score { font-size:1.2em; color:#60a5fa; }
    .ctrl-go-wait { color:#94a3b8; }

    /* ── CONTROLLER MINI SCREEN ── */
    #ctrl-mini-game {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:#1e293b; border-radius:12px; padding:10px;
      border:2px solid #334155;
    }
    .ctrl-game-header {
      display:flex; align-items:center; gap:12px;
    }
    .ctrl-score-info {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      font-size:.75em; color:#94a3b8; min-width:80px;
    }
    #ctrl-board-cv {
      border-radius:6px; border:1px solid #334155; background:#111;
    }

    /* ── RESPONSIVE ── */
    @media (max-width:700px) {
      .title { font-size:2.6em; letter-spacing:6px; }
      #games-grid.p-1 .game-canvas { width:90vw; height:auto; max-height:60vh; }
      #games-grid.p-2 .game-canvas { width:44vw; height:auto; }
      #games-grid.p-3 .game-canvas,
      #games-grid.p-4 .game-canvas { width:42vw; height:auto; }
    }
  </style>
</head>
<body>

  <!-- BEGIN SCREEN (fallback if no ?role= param) -->
  <div id="begin-screen" class="screen" style="display:flex">
    <div class="title">TETRIS</div>
    <div class="title-sub">REMOTE PLAY</div>
    <div class="begin-buttons">
      <button class="begin-btn" id="btn-host"><span class="icon">&#9654;</span> Create Game</button>
      <button class="begin-btn" id="btn-join"><span class="icon">&#127918;</span> Join as Controller</button>
    </div>
  </div>

  <button id="back-btn">&larr; Back</button>
  <div id="toast"></div>

  <!-- HOST: LOBBY -->
  <div id="host-lobby" class="screen">
    <div class="lobby-title">GAME LOBBY</div>
    <div class="lobby-code" id="room-code-display">------</div>
    <div class="lobby-hint">Share this code with controllers to join</div>
    <div id="player-list"><div class="player-list-empty">Waiting for players to connect&hellip;</div></div>
    <button id="start-game-btn" disabled>Start Game</button>
  </div>

  <!-- HOST: STATUS BAR -->
  <div id="host-status-bar">
    <span>Room: <span class="room-code" id="pill-code">---</span></span>
    <span id="pill-players">0 players</span>
  </div>

  <!-- HOST: GAME -->
  <div id="host-game">
    <div id="games-grid"></div>
  </div>

  <!-- HOST: RESULTS -->
  <div id="host-results" class="screen">
    <div class="results-title">GAME OVER</div>
    <div id="results-list"></div>
    <div class="results-buttons">
      <button class="results-btn" id="play-again-btn">Play Again</button>
      <button class="results-btn" id="exit-btn">Exit</button>
    </div>
  </div>

  <!-- CONTROLLER: JOIN -->
  <div id="controller-join" class="screen">
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" maxlength="16" autocomplete="off" spellcheck="false" placeholder="Player">
    <label for="room-input">Room code</label>
    <input id="room-input" type="text" maxlength="6" autocomplete="off" spellcheck="false" placeholder="XXXXXX">
    <button id="connect-btn">Connect</button>
    <div id="join-error"></div>
  </div>

  <!-- CONTROLLER: WAITING -->
  <div id="controller-waiting" class="screen">
    <div class="ctrl-wait-code" id="ctrl-room-code">------</div>
    <div class="ctrl-wait-msg">Waiting for host to start<span class="ctrl-wait-dot">&hellip;</span></div>
  </div>

  <!-- CONTROLLER: D-PAD -->
  <div id="controller-view" class="screen">
    <div id="ctrl-status">Connected</div>
    <div id="ctrl-mini-game">
      <div class="ctrl-game-header">
        <div class="mini-box"><span>Hold</span><canvas id="ctrl-hold-cv" class="mini-canvas" width="64" height="64"></canvas></div>
        <div class="ctrl-score-info">
          <div id="ctrl-score">Score: 0</div>
          <div id="ctrl-lines">Lines: 0</div>
        </div>
        <div class="mini-box"><span>Next</span><canvas id="ctrl-next-cv" class="mini-canvas" width="64" height="64"></canvas></div>
      </div>
      <canvas id="ctrl-board-cv" width="150" height="300"></canvas>
    </div>
    <div class="dpad">
      <button class="btn btn-rotate"   data-action="rotate"   data-repeat="false"><span class="icon">&uarr;</span><span class="label">Rotate</span></button>
      <button class="btn btn-pause"    data-action="pause"    data-repeat="false"><span class="icon">&#9208;</span><span class="label">Pause</span></button>
      <button class="btn btn-left"     data-action="left"     data-repeat="true"><span class="icon">&larr;</span><span class="label">Left</span></button>
      <button class="btn btn-right"    data-action="right"    data-repeat="true"><span class="icon">&rarr;</span><span class="label">Right</span></button>
      <button class="btn btn-softdrop" data-action="softDrop" data-repeat="true"><span class="icon">&darr;</span><span class="label">Drop</span></button>
    </div>
    <div class="bottom-actions">
      <button class="btn btn-wide" data-action="hold" data-repeat="false"><span class="icon">&#128230;</span><span class="label">Hold</span></button>
      <button class="btn btn-wide" data-action="hardDrop" data-repeat="false"><span class="icon">&#9196;</span><span class="label">Hard Drop</span></button>
    </div>
  </div>

  <!-- CONTROLLER: GAME OVER -->
  <div id="controller-gameover" class="screen">
    <div class="ctrl-go-title">GAME OVER</div>
    <div class="ctrl-go-score" id="ctrl-final-score">Score: 0</div>
    <div class="ctrl-go-wait">Waiting for next round<span class="ctrl-wait-dot">&hellip;</span></div>
  </div>

<script src="tetris-js/tetris.js"></script>
</body>
</html>
